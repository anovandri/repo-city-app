# Test profile — uses H2 in-memory, no real GitLab token needed
gitlab.token=test-token
gitlab.base-url=https://gitlab.example.com
gitlab.group=test-group
gitlab.poll-interval-seconds=3600

spring.datasource.url=jdbc:h2:mem:repocity_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
