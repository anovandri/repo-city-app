# ── PostgreSQL (production) ───────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'update' creates tables on first boot and adds new columns on redeploy
# without dropping existing data. Switch to 'validate' once schema is stable.
spring.jpa.hibernate.ddl-auto=update

# Tells Spring Boot to use data-postgresql.sql (instead of data.sql) for seeding.
spring.sql.init.platform=postgresql
# Explicitly point to the PostgreSQL-specific seed script so data.sql is skipped.
spring.sql.init.data-locations=classpath:data-postgresql.sql
# Seed runs on every boot but data-postgresql.sql uses ON CONFLICT DO NOTHING so it is idempotent.
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.jpa.defer-datasource-initialization=true

# Disable H2 console in production
spring.h2.console.enabled=false

# ── CityState Bootstrap Configuration ────────────────────────
# Phase 2: Controls how bootstrap handles stale snapshots
repocity.citystate.bootstrap.staleness-threshold-minutes=5
repocity.citystate.bootstrap.strategy=HYBRID

# ── Actuator ─────────────────────────────────────────────────
management.endpoint.health.show-details=always
