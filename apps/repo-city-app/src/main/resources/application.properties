spring.application.name=repo-city-rest-poller
server.port=${SERVER_PORT:8080}

# ── Virtual Threads (Java 21 Project Loom) ───────────────────
spring.threads.virtual.enabled=true

# ── GitLab client ────────────────────────────────────────────
gitlab.base-url=${GITLAB_BASE_URL:https://gitlab.com}
gitlab.token=${GITLAB_TOKEN:}
gitlab.poll-interval-seconds=${POLL_INTERVAL_SECONDS:60}

# ── CityState Bootstrap Configuration ────────────────────────
# Phase 2: Controls how bootstrap handles stale snapshots
repocity.citystate.bootstrap.staleness-threshold-minutes=5
repocity.citystate.bootstrap.strategy=HYBRID

# ── H2 in-memory datasource (dev default) ────────────────────
spring.datasource.url=jdbc:h2:mem:repocity;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Run data.sql after schema creation
spring.sql.init.mode=always
# Ensure Hibernate DDL runs before data.sql is applied
spring.jpa.defer-datasource-initialization=true

# H2 console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.root=DEBUG
# Enable debug logs for app packages
logging.level.com.repocity=DEBUG
