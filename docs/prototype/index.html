<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Playground Park</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #87ceeb; }
    canvas { display: block; }

    /* ── HUD Panel ── */
    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(10, 20, 35, 0.72);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 14px 18px;
      color: #e8f0fe;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      min-width: 190px;
      user-select: none;
      pointer-events: none;
    }
    #hud h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7ab8ff;
      margin-bottom: 10px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: #9ab0cc; }
    .stat-value {
      font-weight: 700;
      font-size: 15px;
      color: #ffffff;
    }
    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 6px;
      background: #4cdd7a;
      box-shadow: 0 0 5px #4cdd7a;
    }

    /* ── Commit Activity Indicator ── */
    .commit-indicator {
      font-size: 20px;
      line-height: 1;
      filter: drop-shadow(0 0 6px rgba(255,200,0,0.9));
      pointer-events: none;
      user-select: none;
      transition: opacity 0.4s ease;
    }
    .commit-indicator.hidden { opacity: 0; }

    /* ── Merge Request Activity Indicator ── */
    .mr-indicator {
      font-size: 20px;
      line-height: 1;
      filter: drop-shadow(0 0 6px rgba(180,80,255,0.95));
      pointer-events: none;
      user-select: none;
      transition: opacity 0.4s ease;
    }
    .mr-indicator.hidden { opacity: 0; }

    /* ── Merge Success Indicator ── */
    .merged-indicator {
      font-size: 20px;
      line-height: 1;
      filter: drop-shadow(0 0 6px rgba(80,220,120,0.95));
      pointer-events: none;
      user-select: none;
      transition: opacity 0.4s ease;
    }
    .merged-indicator.hidden { opacity: 0; }

    /* ── Commit Toast ── */
    #commit-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(10, 20, 35, 0.88);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(100,200,120,0.4);
      border-radius: 8px;
      padding: 8px 18px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      color: #c8ffd4;
      opacity: 0;
      pointer-events: none;
      user-select: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #commit-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Clan / Organization Identity Label (plaza statue) ── */
    .clan-label {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ffe566;
      background: rgba(20, 12, 0, 0.82);
      border: 1px solid rgba(255, 200, 40, 0.65);
      border-radius: 7px;
      padding: 5px 14px;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      backdrop-filter: blur(4px);
      box-shadow:
        0 0 14px rgba(255, 200, 0, 0.55),
        0 0 32px rgba(255, 160, 0, 0.25),
        0 2px 8px rgba(0, 0, 0, 0.7);
      text-shadow: 0 0 10px rgba(255, 220, 60, 0.85);
      animation: clan-pulse 2.8s ease-in-out infinite;
    }
    .clan-label .clan-icon {
      margin-right: 7px;
      font-size: 14px;
      filter: drop-shadow(0 0 4px rgba(255, 200, 0, 0.8));
    }
    @keyframes clan-pulse {
      0%, 100% {
        box-shadow:
          0 0 12px rgba(255, 200, 0, 0.45),
          0 0 28px rgba(255, 160, 0, 0.18),
          0 2px 8px rgba(0,0,0,0.7);
        text-shadow: 0 0 8px rgba(255, 220, 60, 0.75);
      }
      50% {
        box-shadow:
          0 0 22px rgba(255, 210, 0, 0.75),
          0 0 48px rgba(255, 170, 0, 0.38),
          0 2px 8px rgba(0,0,0,0.7);
        text-shadow: 0 0 16px rgba(255, 230, 80, 1.0);
      }
    }

    /* ── Floating Repo Labels ── */
    .repo-label {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: #ffffff;
      background: rgba(8, 18, 32, 0.78);
      border: 1px solid rgba(120, 180, 255, 0.35);
      border-radius: 5px;
      padding: 3px 7px;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      letter-spacing: 0.02em;
      backdrop-filter: blur(3px);
      box-shadow: 0 1px 6px rgba(0,0,0,0.45);
    }
    .repo-label .repo-icon {
      margin-right: 4px;
    }
    /* Production-support / hot variant */
    .repo-label--support {
      color: #ff4444;
      background: rgba(32, 4, 4, 0.88);
      border-color: rgba(255, 60, 60, 0.7);
      box-shadow: 0 0 10px rgba(255, 40, 40, 0.55);
      animation: support-pulse 1.4s ease-in-out infinite;
    }
    @keyframes support-pulse {
      0%, 100% { box-shadow: 0 0 8px rgba(255, 40, 40, 0.5); }
      50%       { box-shadow: 0 0 18px rgba(255, 80, 80, 0.9); }
    }
    .support-badge {
      display: inline-block;
      margin-left: 5px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #fff;
      background: rgba(200, 0, 0, 0.75);
      border: 1px solid rgba(255, 80, 80, 0.7);
      border-radius: 3px;
      padding: 1px 4px;
      vertical-align: middle;
    }
    /* Sunset / maintenance-mode variant */
    .repo-label--sunset {
      color: #ffe066;
      background: rgba(40, 20, 0, 0.85);
      border-color: rgba(255, 160, 0, 0.6);
      box-shadow: 0 0 8px rgba(255, 140, 0, 0.4);
    }
    .sunset-badge {
      display: inline-block;
      margin-left: 5px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #ff6600;
      background: rgba(255,80,0,0.18);
      border: 1px solid rgba(255,100,0,0.5);
      border-radius: 3px;
      padding: 1px 4px;
      vertical-align: middle;
    }
    /* ── Developer name chips ── */
    .dev-name {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 9px;
      font-weight: 600;
      color: #e8f4ff;
      background: rgba(8, 18, 36, 0.72);
      border: 1px solid rgba(120, 180, 255, 0.28);
      border-radius: 4px;
      padding: 1px 5px;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      backdrop-filter: blur(2px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .dev-name--female {
      color: #ffd6f0;
      border-color: rgba(255, 160, 220, 0.35);
      background: rgba(36, 8, 28, 0.72);
    }
    .dev-name--caretaker {
      color: #c8ffd4;
      border-color: rgba(80, 220, 120, 0.4);
      background: rgba(8, 32, 16, 0.78);
    }
    .dev-name--leader {
      color: #ffe566;
      border-color: rgba(255, 200, 40, 0.6);
      background: rgba(32, 24, 0, 0.88);
      font-size: 10px;
      font-weight: 700;
      box-shadow: 0 0 8px rgba(255, 200, 0, 0.5);
      letter-spacing: 0.04em;
    }

    /* ── Open MRs HUD Button ── */
    #mr-panel-btn {
      all: unset;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      pointer-events: all;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #cc88ff;
      background: rgba(140, 60, 255, 0.18);
      border: 1px solid rgba(180, 80, 255, 0.55);
      border-radius: 6px;
      padding: 5px 11px;
      transition: background 0.2s, box-shadow 0.2s, color 0.2s;
      box-shadow: 0 0 8px rgba(160, 60, 255, 0.3);
      width: 100%;
      justify-content: center;
    }
    #mr-panel-btn:hover {
      background: rgba(180, 80, 255, 0.32);
      color: #e8aaff;
      box-shadow: 0 0 14px rgba(180, 60, 255, 0.55);
    }

    /* ── MR Panel Overlay ── */
    #mr-panel-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(4, 10, 22, 0.62);
      backdrop-filter: blur(3px);
      z-index: 9000;
      align-items: center;
      justify-content: center;
    }
    #mr-panel-overlay.open { display: flex; }

    /* ── MR Panel Card ── */
    #mr-panel {
      position: relative;
      width: min(560px, 92vw);
      max-height: 82vh;
      background: rgba(8, 16, 34, 0.96);
      border: 1px solid rgba(180, 80, 255, 0.45);
      border-radius: 14px;
      box-shadow: 0 0 40px rgba(160, 60, 255, 0.35), 0 8px 32px rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: mr-panel-in 0.22s cubic-bezier(.2,.8,.4,1) both;
    }
    @keyframes mr-panel-in {
      from { opacity: 0; transform: scale(0.92) translateY(12px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);    }
    }

    /* ── Panel header ── */
    #mr-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 10px;
      border-bottom: 1px solid rgba(180, 80, 255, 0.22);
      flex-shrink: 0;
    }
    #mr-panel-title {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: #dd99ff;
      letter-spacing: 0.03em;
      text-shadow: 0 0 12px rgba(200, 100, 255, 0.6);
    }
    #mr-panel-close {
      all: unset;
      cursor: pointer;
      font-size: 18px;
      color: rgba(255,255,255,0.4);
      line-height: 1;
      padding: 2px 6px;
      border-radius: 5px;
      transition: color 0.15s, background 0.15s;
    }
    #mr-panel-close:hover { color: #ff88aa; background: rgba(255,80,100,0.15); }

    /* subtitle + total */
    #mr-panel-subtitle {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 11px;
      color: rgba(200,180,255,0.55);
      padding: 6px 20px 0;
      flex-shrink: 0;
    }
    #mr-panel-total-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px 10px;
      flex-shrink: 0;
    }
    #mr-panel-total-label {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      color: rgba(200,180,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    #mr-panel-total-value {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 22px;
      font-weight: 900;
      color: #ff66cc;
      text-shadow: 0 0 12px rgba(255,80,200,0.7);
    }

    /* ── Scrollable list ── */
    #mr-panel-list {
      overflow-y: auto;
      padding: 6px 14px 16px;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: rgba(180,80,255,0.4) transparent;
    }
    #mr-panel-list::-webkit-scrollbar { width: 5px; }
    #mr-panel-list::-webkit-scrollbar-track { background: transparent; }
    #mr-panel-list::-webkit-scrollbar-thumb { background: rgba(180,80,255,0.4); border-radius: 3px; }

    /* ── Repo rows ── */
    .mr-repo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin-bottom: 5px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.035);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .mr-repo-row:hover {
      background: rgba(180, 80, 255, 0.13);
      border-color: rgba(180, 80, 255, 0.4);
      box-shadow: 0 0 12px rgba(180,60,255,0.25);
    }
    .mr-repo-row.zero {
      opacity: 0.42;
    }
    .mr-repo-row.zero:hover { opacity: 0.75; }

    .mr-repo-icon {
      font-size: 18px;
      flex-shrink: 0;
      width: 26px;
      text-align: center;
    }
    .mr-repo-name {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12.5px;
      font-weight: 600;
      color: #ccd8f8;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mr-repo-row:hover .mr-repo-name { color: #eeddff; }

    .mr-count-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 22px;
      padding: 0 7px;
      border-radius: 11px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
    }
    .mr-count-badge.high {
      background: rgba(255, 60, 100, 0.22);
      border: 1px solid rgba(255, 60, 100, 0.55);
      color: #ff6688;
      box-shadow: 0 0 8px rgba(255,40,80,0.35);
    }
    .mr-count-badge.medium {
      background: rgba(255, 160, 40, 0.18);
      border: 1px solid rgba(255, 160, 40, 0.5);
      color: #ffb840;
      box-shadow: 0 0 6px rgba(255,140,20,0.3);
    }
    .mr-count-badge.low {
      background: rgba(80, 200, 255, 0.15);
      border: 1px solid rgba(80, 200, 255, 0.4);
      color: #66ddff;
    }
    .mr-count-badge.zero {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.3);
    }
    .mr-gitlab-arrow {
      flex-shrink: 0;
      color: rgba(180,130,255,0.45);
      font-size: 13px;
      transition: color 0.15s;
    }
    .mr-repo-row:hover .mr-gitlab-arrow { color: #cc88ff; }

    /* ═══════════════════════════════════════════════════════════
       ── Dev Profile Panel ──────────────────────────────────────
       ═══════════════════════════════════════════════════════════ */

    /* HUD button — teal/cyan, mirrors the purple MR button style */
    #dev-panel-btn {
      all: unset;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      pointer-events: all;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #66ddff;
      background: rgba(40, 180, 220, 0.15);
      border: 1px solid rgba(60, 200, 240, 0.5);
      border-radius: 6px;
      padding: 5px 11px;
      transition: background 0.2s, box-shadow 0.2s, color 0.2s;
      box-shadow: 0 0 8px rgba(40, 200, 240, 0.25);
      width: 100%;
      justify-content: center;
      margin-top: 6px;
    }
    #dev-panel-btn:hover {
      background: rgba(60, 210, 250, 0.28);
      color: #aaeeff;
      box-shadow: 0 0 14px rgba(40, 210, 250, 0.5);
    }

    /* Overlay — same dim/blur as MR panel */
    #dev-panel-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(4, 10, 22, 0.62);
      backdrop-filter: blur(3px);
      z-index: 9100;
      align-items: center;
      justify-content: center;
    }
    #dev-panel-overlay.open { display: flex; }

    /* Card */
    #dev-panel {
      position: relative;
      width: min(660px, 96vw);
      max-height: 90vh;
      background: rgba(6, 14, 30, 0.97);
      border: 1px solid rgba(60, 200, 240, 0.4);
      border-radius: 14px;
      box-shadow: 0 0 40px rgba(40, 200, 240, 0.28), 0 8px 32px rgba(0,0,0,0.75);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: dev-panel-in 0.22s cubic-bezier(.2,.8,.4,1) both;
    }
    @keyframes dev-panel-in {
      from { opacity: 0; transform: scale(0.92) translateY(12px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);    }
    }

    /* Header */
    #dev-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 10px;
      border-bottom: 1px solid rgba(60, 200, 240, 0.18);
      flex-shrink: 0;
    }
    #dev-panel-title {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 800;
      color: #66ddff;
      letter-spacing: 0.04em;
      text-shadow: 0 0 10px rgba(60, 210, 255, 0.6);
    }
    #dev-panel-close {
      all: unset;
      cursor: pointer;
      font-size: 18px;
      color: rgba(255,255,255,0.4);
      line-height: 1;
      padding: 2px 6px;
      border-radius: 5px;
      transition: color 0.15s, background 0.15s;
    }
    #dev-panel-close:hover { color: #ff88aa; background: rgba(255,80,100,0.15); }

    /* Search bar row */
    #dev-search-row {
      display: flex;
      gap: 8px;
      padding: 12px 20px 8px;
      flex-shrink: 0;
    }
    #dev-search-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(60, 200, 240, 0.35);
      border-radius: 8px;
      color: #e8f8ff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #dev-search-input::placeholder { color: rgba(120,180,210,0.5); }
    #dev-search-input:focus {
      border-color: rgba(60, 210, 255, 0.7);
      box-shadow: 0 0 10px rgba(40, 200, 240, 0.3);
    }

    /* Suggestions dropdown */
    #dev-suggestions {
      list-style: none;
      margin: 0 20px 6px;
      padding: 0;
      border: 1px solid rgba(60, 200, 240, 0.25);
      border-radius: 8px;
      background: rgba(6, 16, 34, 0.97);
      overflow: hidden;
      flex-shrink: 0;
    }
    #dev-suggestions:empty { display: none; }
    #dev-suggestions li {
      padding: 8px 14px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12.5px;
      color: #cce8ff;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.12s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #dev-suggestions li:last-child { border-bottom: none; }
    #dev-suggestions li:hover { background: rgba(60, 200, 240, 0.14); }
    #dev-suggestions li .sug-role {
      font-size: 10px;
      color: rgba(120,190,220,0.55);
      margin-left: auto;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Profile card area */
    #dev-profile {
      padding: 0 20px 6px;
      flex-shrink: 0;
    }
    #dev-profile:empty { display: none; }
    .dev-profile-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(60, 200, 240, 0.22);
      border-radius: 10px;
    }
    .dev-avatar {
      font-size: 36px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(40, 180, 220, 0.15);
      border: 2px solid rgba(60, 200, 240, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(40, 200, 240, 0.3);
    }
    .dev-avatar.leader {
      background: rgba(200, 160, 0, 0.18);
      border-color: rgba(255, 200, 40, 0.6);
      box-shadow: 0 0 14px rgba(255, 200, 0, 0.45);
    }
    .dev-avatar.female {
      background: rgba(220, 80, 180, 0.15);
      border-color: rgba(255, 140, 210, 0.45);
      box-shadow: 0 0 12px rgba(255, 100, 200, 0.3);
    }
    .dev-info { flex: 1; min-width: 0; }
    .dev-info-name {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 800;
      color: #e8f8ff;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .dev-info-name.leader { color: #ffe566; text-shadow: 0 0 8px rgba(255,200,0,0.5); }
    .dev-info-gitlab {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 11px;
      color: rgba(100, 200, 240, 0.7);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .dev-role-badge {
      display: inline-block;
      margin-top: 5px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 4px;
    }

    /* Scrollable repo breakdown table */

    /* Table header row */

    /* Mini stat cell (number + icon) */

<script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ── Renderer ──────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// ── Label Renderer (CSS2D — floats above scene) ───────────────
const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.left = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

// ── Repo / Attraction Config ──────────────────────────────────
// 16 real GitLab repositories — two districts + two standalone repos
const REPOS = [
  // ms-partner district (10 repos)
  { id:'msp-admin',    icon:'🛡️',  name:'ms-partner-administration',       pos:[-48, 8,  -8 ], type:'admin'      },
  { id:'msp-atome',    icon:'⚛️',  name:'ms-partner-atome',                pos:[-48, 7,  -24], type:'atome'      },
  { id:'msp-cb',       icon:'🔔', name:'ms-partner-callback',              pos:[-32, 7,  -36], type:'callback'   },
  { id:'msp-cbrl',     icon:'⏱️',  name:'ms-partner-callback-rate-limiter',pos:[-48, 7,  -40], type:'cbrl'       },
  { id:'msp-cust',     icon:'👥', name:'ms-partner-customer',              pos:[-32, 7,  -52], type:'customer'   },
  { id:'msp-gw',       icon:'🌐', name:'ms-partner-gateway',               pos:[-16, 8,  -52], type:'gateway'    },
  { id:'msp-int',      icon:'�', name:'ms-partner-integration-platform',  pos:[-64, 8,  -24], type:'integration'},
  { id:'msp-reg',      icon:'📝', name:'ms-partner-registration',          pos:[-64, 7,  -40], type:'reg'        },
  { id:'msp-txn',      icon:'�', name:'ms-partner-transaction',           pos:[-48, 9,  -56], type:'txn'        },
  { id:'msp-web',      icon:'🖥️',  name:'ms-partner-web',                  pos:[-16, 7,  -36], type:'web'        },
  // ms-pip district (4 repos)
  { id:'pip-cat',      icon:'📚', name:'ms-pip-catalog',                   pos:[ 24, 7,  -36], type:'catalog'    },
  { id:'pip-gw',       icon:'🚪', name:'ms-pip-gateway',                   pos:[ 40, 8,  -24], type:'pipgw'      },
  { id:'pip-res',      icon:'📦', name:'ms-pip-resource',                  pos:[ 40, 7,  -40], type:'resource'   },
  { id:'pip-txn',      icon:'💳', name:'ms-pip-transaction',               pos:[ 24, 8,  -52], type:'piptxn'     },
  // Standalone repos
  { id:'webview-auto', icon:'🤖', name:'partner-webview-automation-test',  pos:[ 24, 7,   20], type:'automation' },
  { id:'partnership',  icon:'🤝', name:'partnership-automation',           pos:[ 40, 7,   20], type:'partner'    },
  // Sunset / maintenance-mode repos
  { id:'ginpay',       icon:'⚠️', name:'ms-ginpay',                        pos:[  8, 6,  -36], type:'sunset', sunset: true },
  // Production Support — always hot
  { id:'prod-support', icon:'🚨', name:'production-support',               pos:[ 20, 14,   0], type:'support', support: true },
];

// ── Floating Repo Labels (CSS2D — created after scene is ready) ──
// Labels are attached to invisible anchor objects placed at each repo's
// roof level; CSS2DRenderer projects them as DOM elements that always
// face the camera. Created lazily after scene setup via a deferred array.
const repoLabelObjects = [];   // filled below after scene exists

// ── Scene & Camera ────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 80, 220);

// Build one CSS2DObject label per repo and anchor it at roof height
REPOS.forEach(repo => {
  const div = document.createElement('div');
  div.className = 'repo-label'
    + (repo.sunset  ? ' repo-label--sunset'  : '')
    + (repo.support ? ' repo-label--support' : '');
  div.innerHTML = `<span class="repo-icon">${repo.icon}</span>${repo.name}`
    + (repo.sunset  ? '<span class="sunset-badge">SUNSET SOON</span>'  : '')
    + (repo.support ? '<span class="support-badge">🔴 LIVE</span>' : '');

  const labelObj = new CSS2DObject(div);
  // pos = [x, roofHeight, z] — float 2 units above the roof
  labelObj.position.set(repo.pos[0], repo.pos[1] + 2, repo.pos[2]);
  scene.add(labelObj);
  repoLabelObjects.push(labelObj);
});

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 400);
camera.position.set(55, 30, 65);

// ── Orbit Controls (mouse drag, pinch zoom, right-drag pan) ───
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.minDistance = 8;
controls.maxDistance = 200;
controls.maxPolarAngle = Math.PI / 2.05;
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.update();

// ── WASD keyboard walk (shifts both camera + orbit target) ─────
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true;  });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

function updateCamera() {
  if (!Object.values(keys).some(Boolean)) return;
  const speed = 0.55;
  // Flat forward = direction from camera to target, projected onto XZ
  const fwd = controls.target.clone().sub(camera.position);
  fwd.y = 0; fwd.normalize();
  const right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0,1,0)).normalize();

  const move = new THREE.Vector3();
  if (keys['KeyW'] || keys['ArrowUp'])    move.addScaledVector(fwd,   speed);
  if (keys['KeyS'] || keys['ArrowDown'])  move.addScaledVector(fwd,  -speed);
  if (keys['KeyA'] || keys['ArrowLeft'])  move.addScaledVector(right,-speed);
  if (keys['KeyD'] || keys['ArrowRight']) move.addScaledVector(right, speed);

  // Move both camera and orbit target so the view doesn't snap
  camera.position.add(move);
  controls.target.add(move);
  // Keep camera above ground
  camera.position.y = Math.max(1.5, camera.position.y);
}

// ── Lights ────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xfffbe0, 1.2);
sun.position.set(15, 25, 15);
sun.castShadow = true;
scene.add(sun);

// ── Helpers ───────────────────────────────────────────────────
function box(w, h, d, color, x, y, z, ry = 0) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color })
  );
  m.position.set(x, y, z);
  m.rotation.y = ry;
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m); return m;
}
function plane(w, d, color, x, y, z, ry = 0) {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(w, d),
    new THREE.MeshLambertMaterial({ color })
  );
  m.rotation.x = -Math.PI / 2; m.rotation.z = ry;
  m.position.set(x, y, z);
  m.receiveShadow = true;
  scene.add(m); return m;
}
function cyl(rt, rb, h, color, x, y, z) {
  const m = new THREE.Mesh(
    new THREE.CylinderGeometry(rt, rb, h, 12),
    new THREE.MeshLambertMaterial({ color })
  );
  m.position.set(x, y, z);
  m.castShadow = true; scene.add(m); return m;
}
function sphere(r, color, x, y, z) {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(r, 8, 6),
    new THREE.MeshLambertMaterial({ color })
  );
  m.position.set(x, y, z);
  m.castShadow = true; scene.add(m); return m;
}
function cone(r, h, color, x, y, z) {
  const m = new THREE.Mesh(
    new THREE.ConeGeometry(r, h, 8),
    new THREE.MeshLambertMaterial({ color })
  );
  m.position.set(x, y, z);
  m.castShadow = true; scene.add(m); return m;
}
// tree: trunk + sphere canopy
function tree(x, z, h = 1.8, r = 1.1) {
  cyl(0.18, 0.22, h, 0x7a5230, x, h * 0.5, z);
  sphere(r, 0x2e9e2e, x, h + r * 0.75, z);
}
// bench: seat + backrest + two legs  (scaled to match ~0.57-tall characters)
function bench(x, z, ry = 0) {
  const g = new THREE.Group();
  const seat = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.05, 0.18), new THREE.MeshLambertMaterial({color:0x8b5e3c}));
  seat.position.set(0, 0.18, 0); seat.castShadow=true; g.add(seat);
  const back = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.16, 0.04), new THREE.MeshLambertMaterial({color:0x8b5e3c}));
  back.position.set(0, 0.28, 0.08); back.castShadow=true; g.add(back);
  [-0.28, 0.28].forEach(ox => {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.18, 0.18), new THREE.MeshLambertMaterial({color:0x6b4423}));
    leg.position.set(ox, 0.09, 0); g.add(leg);
  });
  g.position.set(x, 0, z); g.rotation.y = ry;
  scene.add(g);
}
// lamp post: pole + head
function lamp(x, z) {
  cyl(0.07, 0.09, 3.5, 0x555555, x, 1.75, z);
  // arm
  const arm = new THREE.Mesh(new THREE.BoxGeometry(0.06,0.06,0.6), new THREE.MeshLambertMaterial({color:0x555555}));
  arm.position.set(x, 3.55, z+0.3); arm.castShadow=true; scene.add(arm);
  // lamp head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.18,8,6), new THREE.MeshLambertMaterial({color:0xffffcc}));
  head.position.set(x, 3.55, z+0.6); head.castShadow=true; scene.add(head);
}
// small bush: low sphere cluster
function bush(x, z) {
  sphere(0.55, 0x3aaa3a, x,      0.45, z);
  sphere(0.4,  0x2e8c2e, x+0.4,  0.38, z+0.1);
  sphere(0.38, 0x36a036, x-0.35, 0.35, z-0.1);
}

// ── Ground ────────────────────────────────────────────────────
plane(200, 200, 0x5aaa3c, 0, 0, 0);

// ── Zone Ground Tiles (district quadrants, y=0.01 so they sit above grass) ──
// ms-partner district: large NW block
plane(72, 60, 0x3d7a5e, -44, 0.01, -34);   // ms-partner campus (NW large)
// ms-pip district: NE block
plane(32, 32, 0x3a6a9a,  36, 0.01, -38);   // ms-pip campus (NE)
// Standalone zone: SE small pad
plane(28, 14, 0x8a7a3a,  36, 0.01,  20);   // standalone repos (SE)

// ── Park Grid (city-block style tiles) ───────────────────────
(function buildGrid() {
  const TILE = 16;         // tile size in world units
  const HALF = 80;         // grid extends –80 … +80
  const LINE_W = 0.12;     // line thickness
  const LINE_H = 0.012;    // sits just above ground
  const MAT_X  = new THREE.MeshLambertMaterial({ color: 0x4a9430 }); // E–W lines
  const MAT_Z  = new THREE.MeshLambertMaterial({ color: 0x4a9430 }); // N–S lines

  // Vertical lines (along Z axis)
  for (let x = -HALF; x <= HALF; x += TILE) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(LINE_W, LINE_H, HALF * 2), MAT_Z);
    m.position.set(x, LINE_H / 2, 0);
    m.receiveShadow = true;
    scene.add(m);
  }
  // Horizontal lines (along X axis)
  for (let z = -HALF; z <= HALF; z += TILE) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(HALF * 2, LINE_H, LINE_W), MAT_X);
    m.position.set(0, LINE_H / 2, z);
    m.receiveShadow = true;
    scene.add(m);
  }
})();

// ── Central Plaza (round stone circle via cylinder) ───────────
cyl(4, 4, 0.08, 0xd4c8a8, 0, 0.04, 0);

// Statue at plaza center — developer figure on a pedestal
cyl(0.55, 0.6, 0.18, 0xb8b0a0, 0, 0.09, 0);          // pedestal base slab
cyl(0.32, 0.36, 0.55, 0xa0998a, 0, 0.45, 0);          // pedestal column
cyl(0.42, 0.42, 0.1, 0xb8b0a0, 0, 0.75, 0);           // pedestal cap
// figure: legs + torso + head + raised arm (bronze-ish tint)
box(0.09, 0.22, 0.09, 0x8a7a5a, -0.05, 0.97, 0);      // leg L
box(0.09, 0.22, 0.09, 0x8a7a5a,  0.05, 0.97, 0);      // leg R

const ENG_SHIRTS = [0xff4444, 0x44aaff, 0xffaa00, 0x44cc66, 0xcc44cc,
                    0xff8800, 0x00ccaa, 0xee3366, 0x99cc00, 0x5588ff,

const CARETAKER_WPS = [0, 53];

function makePerson(person, idx, startX, startZ) {
  const { gender, role } = person;
  const isFemale   = gender === 'female';
  const isLeader   = role   === 'leader';
  const isCaretaker = role  === 'caretaker';

  const skinColor  = isFemale ? 0xf7c8a0 : 0xf5c07a;
  const shirtColor = isLeader    ? 0xddaa00
                   : isCaretaker ? (isFemale ? 0x44bb66 : 0x228844)
                   : ENG_SHIRTS[idx % ENG_SHIRTS.length];
  const legColor   = isFemale ? 0xdd8888 : isLeader ? 0x222255 : 0x2255cc;
  const hatColor   = isLeader    ? 0xffcc00
                   : isCaretaker ? 0x88dd88
                   : [0xffdd00,0xffffff,0xff6600,0x00dddd,0xff88cc,
                      0xaaffaa,0xff99ff,0xffcc44,0x44ffee,0xccccff][idx % 10];
  const scale = isLeader ? 1.25 : 1.0;

  const g   = new THREE.Group();
  const mat = c => new THREE.MeshLambertMaterial({ color: c });

  if (isFemale) {
    // Skirt
    const skirt = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.2, 0.14), mat(legColor));
    skirt.position.set(0, 0.1, 0); g.add(skirt);
    const shL = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.06, 0.09), mat(0x333333));
    shL.position.set(-0.05, 0.03, 0); g.add(shL);
    const shR = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.06, 0.09), mat(0x333333));
    shR.position.set( 0.05, 0.03, 0); g.add(shR);
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.19, 0.18, 0.10), mat(shirtColor));
    torso.position.set(0, 0.29, 0); g.add(torso);
    const aL = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.15, 0.06), mat(shirtColor));
    aL.position.set(-0.13, 0.28, 0); g.add(aL);
    const aR = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.15, 0.06), mat(shirtColor));
    aR.position.set( 0.13, 0.28, 0); g.add(aR);
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.16, 0.16), mat(skinColor));
    head.position.set(0, 0.46, 0); g.add(head);
    // Hair bun
    const bun = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.09, 0.09), mat(0x3a2010));
    bun.position.set(0, 0.57, -0.03); g.add(bun);
    const band = new THREE.Mesh(new THREE.BoxGeometry(0.17, 0.04, 0.04), mat(0xee6699));
    band.position.set(0, 0.545, -0.03); g.add(band);

    g.scale.setScalar(scale);
    g.position.set(startX, 0, startZ);
    scene.add(g);

    // Floating name chip
    const div = document.createElement('div');
    div.className = 'dev-name dev-name--female' + (isCaretaker ? ' dev-name--caretaker' : '');
    div.textContent = person.name;
    const lObj = new CSS2DObject(div);
    lObj.position.set(0, 0.78 * scale, 0);
    g.add(lObj);

    return { group: g, lL: skirt, lR: shL, aL, aR, role, isStationary: false, name: person.name };

  } else {
    // Male legs
    const lL = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.18, 0.09), mat(legColor));
    lL.position.set(-0.05, 0.09, 0); g.add(lL);
    const lR = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.18, 0.09), mat(legColor));
    lR.position.set( 0.05, 0.09, 0); g.add(lR);
    const torso = new THREE.Mesh(
      new THREE.BoxGeometry(isLeader ? 0.23 : 0.2, isLeader ? 0.22 : 0.2, 0.11),
      mat(shirtColor)
    );
    torso.position.set(0, 0.28, 0); g.add(torso);
    const aL = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.17, 0.07), mat(shirtColor));
    aL.position.set(-0.14, 0.27, 0); g.add(aL);
    const aR = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.17, 0.07), mat(shirtColor));
    aR.position.set( 0.14, 0.27, 0); g.add(aR);
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.17, 0.17, 0.17), mat(skinColor));
    head.position.set(0, 0.46, 0); g.add(head);

    if (isLeader) {
      // Gold crown brim + 3 spikes + gem
      const crown = new THREE.Mesh(new THREE.BoxGeometry(0.23, 0.05, 0.23), mat(0xffcc00));
      crown.position.set(0, 0.565, 0); g.add(crown);
      [-0.07, 0, 0.07].forEach(cx => {
        const spike = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.1, 0.05), mat(0xffdd33));
        spike.position.set(cx, 0.635, 0); g.add(spike);
      });
      const gem = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.04), mat(0xff4444));
      gem.position.set(0, 0.695, -0.06); g.add(gem);
    } else {
      // Flat cap + brim
      const cap = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.07, 0.2), mat(hatColor));
      cap.position.set(0, 0.565, 0); g.add(cap);
      const brim = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.03, 0.12), mat(hatColor));
      brim.position.set(0, 0.538, -0.06); g.add(brim);
    }

    g.scale.setScalar(scale);
    if (isLeader) {
      // Seat Wira on the south plaza bench at (0, 0, -6), rotation Math.PI
      g.position.set(startX, 0.18, startZ);   // sit on seat (y=0.18)
      g.rotation.y = Math.PI;                  // face inward toward statue
      lL.rotation.x = -Math.PI / 2;            // legs bent horizontal
      lR.rotation.x = -Math.PI / 2;
      lL.position.set(-0.05, 0.0,  0.09);      // thighs project forward
      lR.position.set( 0.05, 0.0,  0.09);
      aL.rotation.x =  0.5;                    // arms rest on lap
      aR.rotation.x =  0.5;
    } else {
      g.position.set(startX, 0, startZ);
    }
    scene.add(g);

    // Floating name chip
    const div = document.createElement('div');
    div.className = 'dev-name'
      + (isLeader    ? ' dev-name--leader'    : '')
      + (isCaretaker ? ' dev-name--caretaker' : '');
    div.textContent = isLeader ? '👑 ' + person.name : person.name;
    const lObj = new CSS2DObject(div);
    lObj.position.set(0, (isLeader ? 0.88 : 0.72) * scale, 0);
    g.add(lObj);

    return { group: g, lL, lR, aL, aR, role, isStationary: isLeader, name: person.name };
  }
}

const devs = PEOPLE.map((person, i) => {
  const { role } = person;
  let startWP, ox, oz;
  if (role === 'leader') {
    // Place Wira directly on the south plaza bench
    startWP = { x: 0, z: -6 }; ox = 0; oz = 0;
  } else if (role === 'caretaker') {
    startWP = WAYPOINTS[0];
    ox = ((i % 3) - 1) * 1.5;
    oz = ((i % 2)     ) * 1.5 - 0.75;
  } else {
    startWP = WAYPOINTS[i % WAYPOINTS.length];
    ox = ((i % 5) - 2) * 1.3;
    oz = (Math.floor(i / 5) % 3 - 1) * 1.3;
  }
  const parts = makePerson(person, i, startWP.x + ox, startWP.z + oz);
  const targetIdx = role === 'leader'    ? 0   // stationary — target ignored
                  : role === 'caretaker' ? CARETAKER_WPS[i % CARETAKER_WPS.length]
                  : (i + 3) % WAYPOINTS.length;
  const speed = role === 'engineer'  ? 0.014 + (i % 8) * 0.002
              : role === 'caretaker' ? 0.007 + (i % 3) * 0.001
              : 0;   // leader: seated, never moves
  return { ...parts, targetIdx, speed, phase: i * 0.8 };
});

// ── Commit visual helpers — always activate / deactivate together ──
// activateCommit starts ALL three indicators (toast, hammer, beam) at once.
// deactivateCommit stops ALL three at once.
// showToast is never called outside these two helpers.
function activateCommit(struct, toastMsg) {
  // Toast — stays up for the full work duration (7 s) + a short grace period
  showToast(toastMsg, 7500);

  // Hammer indicator
  const ind = struct.indicator;
  clearTimeout(ind.timer);
  ind.el.classList.remove('hidden');
  ind.active = true;

  // Building glow light + windows
  const cl = struct.commitLight;
  cl.active    = true;
  cl.fadeOut   = false;
  cl.intensity = 0;          // ramps up in animate()

  // Vertical beam
  const bm = struct.beam;
  bm.active   = true;
  bm.fadeOut  = false;
  bm.opacity  = 0;           // ramps up in animate()
}

function deactivateCommit(struct) {
  // Hide toast immediately when commit finishes
  hideToast();

  // Fade out beam
  struct.beam.fadeOut = true;

  // Fade out glow light + windows
  struct.commitLight.fadeOut = true;

  // Hide hammer — CSS opacity transition handles the visual fade
  const ind = struct.indicator;
  ind.el.classList.add('hidden');
  clearTimeout(ind.timer);
  ind.timer = setTimeout(() => {
    ind.active = false;
    ind.anchor.position.y = struct.commitLight.light.position.y + 3;
  }, 500);
}

// ── Merge Request flow line ────────────────────────────────────
// A glowing tube that animates from the developer outward to the repository
// over ~1.5 s, then disappears as the MR beam/icon appear.
const activeMRFlows = [];

function spawnMRFlow(devGroup, repoPos) {
  const from = devGroup.position.clone();
  const to   = new THREE.Vector3(repoPos.x, from.y, repoPos.z); // keep Y flat

  // Build the full tube along the path
  const curve = new THREE.LineCurve3(from, to);
  const geo   = new THREE.TubeGeometry(curve, 12, 0.22, 6, false);
  const mat   = new THREE.MeshBasicMaterial({
    color:      0xcc44ff,
    transparent: true,
    opacity:    0.85,
    depthWrite: false,
    blending:   THREE.AdditiveBlending,
  });
  const mesh = new THREE.Mesh(geo, mat);

  // Pivot sits at the developer end so scaleX (along tube) grows outward
  // The tube geometry itself is already in world space — no pivot trick needed
  // Instead we'll clip via opacity + a progress-driven "mask" by rebuilding
  // the curve end point each frame (only 2 control points = cheap).
  mesh.renderOrder = 2;
  scene.add(mesh);

  activeMRFlows.push({ mesh, mat, geo, from, to, progress: 0 });
}

// ── Merge Request visual helpers ──────────────────────────────
function activateMR(struct, toastMsg) {
  showToast(toastMsg, 7500);

  // 🔀 icon
  const ind = struct.mrIndicator;
  clearTimeout(ind.timer);
  ind.el.classList.remove('hidden');
  ind.active = true;

  // Purple beam
  const bm = struct.mrBeam;
  bm.active  = true;
  bm.fadeOut = false;
  bm.opacity = 0;   // ramps up in animate()
}

function deactivateMR(struct) {
  hideToast();

  // Fade out purple beam
  struct.mrBeam.fadeOut = true;

  // Hide 🔀 icon
  const ind = struct.mrIndicator;
  ind.el.classList.add('hidden');
  clearTimeout(ind.timer);
  ind.timer = setTimeout(() => {
    ind.active = false;
    ind.anchor.position.y = struct.commitLight.light.position.y + 3;
  }, 500);
}

// ── Merge Success helpers ─────────────────────────────────────
function activateMergeSuccess(struct, toastMsg) {
  // Show toast for merge success
  showToast(toastMsg, 4000);

  // Success icon
  const ind = struct.mergedIndicator;
  clearTimeout(ind.timer);
  ind.el.classList.remove('hidden');
  ind.active = true;

  // Green success beam
  const bm = struct.mergedBeam;
  bm.active  = true;
  bm.fadeOut = false;
  bm.opacity = 0; // ramps up in animate()
}

function deactivateMergeSuccess(struct) {
  // Fade out green beam
  struct.mergedBeam.fadeOut = true;

  // Hide ✅ icon
  const ind = struct.mergedIndicator;
  ind.el.classList.add('hidden');
  clearTimeout(ind.timer);
  ind.timer = setTimeout(() => {
    ind.active = false;
    ind.anchor.position.y = struct.commitLight.light.position.y + 3;
  }, 500);
}

function triggerMergeSuccess(struct, dev) {
  // Record mr-merge + pipeline events for the dev profile panel
  recordActivity(dev.name, 'mr-merge', struct.repo);
  recordActivity(dev.name, 'pipeline', struct.repo);
  // Hide MR visuals without touching the toast (we'll show a new toast)
  if (struct.mrBeam) struct.mrBeam.fadeOut = true;
  if (struct.mrIndicator) {
    struct.mrIndicator.el.classList.add('hidden');
    clearTimeout(struct.mrIndicator.timer);
    struct.mrIndicator.timer = setTimeout(() => { struct.mrIndicator.active = false; }, 500);
  }

  // Small burst effect at rooftop
  const wp = WAYPOINTS[struct.waypointIdx];
  const rep = REPO_BY_TYPE[struct.type];
  const bx  = rep ? rep.pos[0] : wp.x;
  const by  = rep ? rep.pos[1] : 7;
  const bz  = rep ? rep.pos[2] : wp.z;

  const burstGeo = new THREE.SphereGeometry(0.3, 8, 8);
  const burstMat = new THREE.MeshBasicMaterial({ color: 0x66ff88, transparent: true, opacity: 1, blending: THREE.AdditiveBlending });
  const burst = new THREE.Mesh(burstGeo, burstMat);
  burst.position.set(bx, by + 2.5, bz);
  scene.add(burst);

  // Animate burst: scale up and fade over ~1s then remove
  const burstStart = Date.now();
  const burstTimer = setInterval(() => {
    const p = (Date.now() - burstStart) / 1000;
    if (p >= 1.0) {
      clearInterval(burstTimer);
      scene.remove(burst);
      burstGeo.dispose();
      burstMat.dispose();
      // After burst, show success icon & beam
      const mergedMsg = `✅ ${dev.name} merged a merge request in ${struct.repo}`;
      activateMergeSuccess(struct, mergedMsg);
      // Keep success visuals for 3s then hide
      setTimeout(() => { deactivateMergeSuccess(struct); }, 3000);
    } else {
      const scale = 1 + p * 2.0;
      burst.scale.setScalar(scale);
      burstMat.opacity = 1 - p;
    }
  }, 16);
}

// ── Commit simulation state ────────────────────────────────────
// A "commit job" tracks the developer sent to work, the target structure,
// and whether the dev has arrived and started their "work pause".
let activeJobs = [];   // array so multiple commits can overlap

function fireCommitEvent() {
  // Pick a random non-stationary developer and a random structure
  const eligible = devs.filter(d => !d.isStationary && d.role !== 'caretaker');
  if (eligible.length === 0) return;
  const dev    = eligible[Math.floor(Math.random() * eligible.length)];
  const struct = STRUCTURES[Math.floor(Math.random() * STRUCTURES.length)];

  // Send the developer to that building's waypoint
  dev.targetIdx  = struct.waypointIdx;
  dev.commitJob  = null;   // clear any previous job so arrival logic resets

  // Register the job (arrival check happens in animate)
  const job = { dev, struct, arrived: false, workTimer: null,
                toastMsg: `👨‍💻 ${dev.name} committed to ${struct.repo}` };
  dev.commitJob = job;
  activeJobs.push(job);

  // Start a pulse on the target structure (intensity decays in animate())
  activePulse = { type: struct.type, intensity: 1.0 };
}

// Fire first event after 2 s, then every 5–8 s (randomised interval)
function scheduleNext() {
  const delay = 5000 + Math.random() * 3000;
  setTimeout(() => { fireCommitEvent(); scheduleNext(); }, delay);
}
setTimeout(() => { fireCommitEvent(); scheduleNext(); }, 2000);

// ── Merge Request Event Simulation ───────────────────────────
let activeMRJobs = [];   // same pattern as activeJobs

function fireMREvent() {
  const eligible = devs.filter(d => !d.isStationary && d.role !== 'caretaker');
  if (eligible.length === 0) return;
  const dev    = eligible[Math.floor(Math.random() * eligible.length)];
  const struct = STRUCTURES[Math.floor(Math.random() * STRUCTURES.length)];

  dev.targetIdx = struct.waypointIdx;
  dev.mrJob     = null;

  const job = { dev, struct, arrived: false, workTimer: null,
                toastMsg: `🔀 ${dev.name} opened a merge request in ${struct.repo}` };
  dev.mrJob = job;
  activeMRJobs.push(job);
}

// Fire first MR event after 3.5 s, then every 8–12 s (offset from commits)
function scheduleMRNext() {
  const delay = 8000 + Math.random() * 4000;
  setTimeout(() => { fireMREvent(); scheduleMRNext(); }, delay);
}
setTimeout(() => { fireMREvent(); scheduleMRNext(); }, 3500);

// ── Animation Loop ────────────────────────────────────────────
let t = 0;

function animate() {
  requestAnimationFrame(animate);
  t += 0.016;

  if (activePulse) {
    activePulse.intensity -= 0.005;
    if (activePulse.intensity <= 0) activePulse = null;
  }

  // ── Bob active commit indicators ──────────────────────────────
  STRUCTURES.forEach(s => {
    const ind = s.indicator;
    if (!ind.active) return;
    ind.anchor.position.y = s.commitLight.light.position.y + 3
                          + Math.sin(t * 2.5 + ind.bobOffset) * 0.35;
  });

  // ── Animate building commit glow lights ───────────────────────
  STRUCTURES.forEach(s => {
    const cl = s.commitLight;
    if (!cl.active) return;

    if (cl.fadeOut) {
      // Decay intensity back to zero
      cl.intensity = Math.max(0, cl.intensity - 0.018);
      if (cl.intensity === 0) {
        cl.active  = false;
        cl.fadeOut = false;
      }
    } else {
      // Ramp up quickly then pulse slowly
      if (cl.intensity < 1.0) {
        cl.intensity = Math.min(1.0, cl.intensity + 0.04);
      }
      // Slow pulse on top of base intensity: ±0.25 at 1.2 Hz
      cl.intensity = Math.max(0.5, Math.min(1.2,
        cl.intensity + Math.sin(t * 1.2 * Math.PI) * 0.003
      ));
    }

    // Apply to point light
    cl.light.intensity = cl.intensity * 3.5;

    // Apply emissive intensity to glow windows
    const emv = cl.intensity * 1.1;
    cl.glowWindows.forEach(w => {
      w.material.emissiveIntensity = emv;
    });
  });

  // ── Animate vertical light beams ──────────────────────────────
  STRUCTURES.forEach(s => {
    const bm = s.beam;
    if (!bm.active) return;

    if (bm.fadeOut) {
      bm.opacity = Math.max(0, bm.opacity - 0.014);
      if (bm.opacity === 0) {
        bm.active  = false;
        bm.fadeOut = false;
      }
    } else {
      // Ramp up to max opacity then pulse gently
      if (bm.opacity < 0.32) {
        bm.opacity = Math.min(0.32, bm.opacity + 0.016);
      }
      // Gentle slow pulse ±0.06 at ~0.8 Hz
      bm.opacity = Math.max(0.14, Math.min(0.38,
        bm.opacity + Math.sin(t * 0.8 * Math.PI) * 0.002
      ));
    }
    bm.mat.opacity = bm.opacity;
  });

  // ── Bob active MR indicators ───────────────────────────────────
  STRUCTURES.forEach(s => {
    const ind = s.mrIndicator;
    if (!ind.active) return;
    ind.anchor.position.y = s.commitLight.light.position.y + 3
                          + Math.sin(t * 2.0 + ind.bobOffset) * 0.35;
  });

  // ── Animate MR light beams (purple) ──────────────────────────
  STRUCTURES.forEach(s => {
    const bm = s.mrBeam;
    if (!bm.active) return;

    if (bm.fadeOut) {
      bm.opacity = Math.max(0, bm.opacity - 0.014);
      if (bm.opacity === 0) {
        bm.active  = false;
        bm.fadeOut = false;
      }
    } else {
      if (bm.opacity < 0.32) {
        bm.opacity = Math.min(0.32, bm.opacity + 0.016);
      }
      bm.opacity = Math.max(0.14, Math.min(0.38,
        bm.opacity + Math.sin(t * 0.65 * Math.PI) * 0.002
      ));
    }
    bm.mat.opacity = bm.opacity;
  });

  // ── Animate Merge Success beams (green) & bobbing ✅ icons ───
  STRUCTURES.forEach(s => {
    // bob ✅ icon
    const mind = s.mergedIndicator;
    if (mind && mind.active) {
      mind.anchor.position.y = s.commitLight.light.position.y + 3
                            + Math.sin(t * 2.2 + mind.bobOffset) * 0.35;
    }

    // green beam
    const sb = s.mergedBeam;
    if (!sb || !sb.active) return;

    if (sb.fadeOut) {
      sb.opacity = Math.max(0, sb.opacity - 0.02);
      if (sb.opacity === 0) {
        sb.active  = false;
        sb.fadeOut = false;
      }
    } else {
      if (sb.opacity < 0.28) sb.opacity = Math.min(0.28, sb.opacity + 0.02);
      sb.opacity = Math.max(0.12, Math.min(0.34, sb.opacity + Math.sin(t * 0.9 * Math.PI) * 0.002));
    }
    sb.mat.opacity = sb.opacity;
  });

  // ── Animate MR flow lines ─────────────────────────────────────
  // Each frame: advance progress 0→1 over ~1.5 s (≈0.011/frame at 60fps),
  // rebuild the short tube geometry so the glowing line grows from dev→repo.
  for (let i = activeMRFlows.length - 1; i >= 0; i--) {
    const f = activeMRFlows[i];
    f.progress = Math.min(1, f.progress + 0.011);

    // Lerp the current end point along from→to
    const curEnd = f.from.clone().lerp(f.to, f.progress);

    // Rebuild geometry only when the tip is still moving
    if (f.progress < 1) {
      f.geo.dispose();
      f.geo = new THREE.TubeGeometry(
        new THREE.LineCurve3(f.from, curEnd), 12, 0.22, 6, false
      );
      f.mesh.geometry = f.geo;
    }

    // Fade out quickly at the end (last 20% of travel)
    f.mat.opacity = f.progress > 0.8
      ? 0.85 * (1 - (f.progress - 0.8) / 0.2)
      : 0.85;

    // Remove once fully faded
    if (f.progress >= 1) {
      scene.remove(f.mesh);
      f.geo.dispose();
      f.mat.dispose();
      activeMRFlows.splice(i, 1);
    }
  }

  // ── Check active commit jobs for arrival ───────────────────────
  activeJobs = activeJobs.filter(job => {
    if (job.arrived) return false;   // already handled, remove
    const wp  = WAYPOINTS[job.struct.waypointIdx];
    const dist = job.dev.group.position.distanceTo(wp);
    if (dist < 1.2) {
      // Developer has arrived — freeze them in a "working" pose
      job.arrived = true;
      job.dev.isWorking = true;
      // Arms raised slightly (typing/working pose)
      job.dev.aL.rotation.x = -0.6;
      job.dev.aR.rotation.x = -0.6;
      job.dev.lL.rotation.x =  0;
      job.dev.lR.rotation.x =  0;

      // ── Activate all commit visuals together ──────────────────
      activateCommit(job.struct, job.toastMsg);

      // After 7 s: release dev and deactivate all visuals together
      job.workTimer = setTimeout(() => {
        job.dev.isWorking = false;
        job.dev.commitJob = null;
        // Resume normal road walking
        const neighbours = ROAD_GRAPH[job.dev.targetIdx];
        job.dev.targetIdx = neighbours[Math.floor(Math.random() * neighbours.length)];

        // ── Deactivate all commit visuals together ────────────────
        deactivateCommit(job.struct);
      }, 7000);
    }
    return !job.arrived;
  });

  // ── Check active MR jobs for arrival ──────────────────────────
  activeMRJobs = activeMRJobs.filter(job => {
    if (job.arrived) return false;
    const wp   = WAYPOINTS[job.struct.waypointIdx];
    const dist = job.dev.group.position.distanceTo(wp);
    if (dist < 1.2) {
      job.arrived = true;
      job.dev.isWorking = true;
      job.dev.aL.rotation.x = -0.6;
      job.dev.aR.rotation.x = -0.6;
      job.dev.lL.rotation.x =  0;
      job.dev.lR.rotation.x =  0;

      // ── Spawn the flow line immediately (dev → repo) ──────────
      const rep = REPO_BY_TYPE[job.struct.type];
      const repoPos = rep
        ? { x: rep.pos[0], z: rep.pos[2] }
        : { x: wp.x, z: wp.z };
      spawnMRFlow(job.dev.group, repoPos);

      // ── After 1.5 s (flow reaches building): show beam + icon ─
      setTimeout(() => {
        activateMR(job.struct, job.toastMsg);
      }, 1500);

      // After 1.5 s flow + 7 s active = 8.5 s total work period
      job.workTimer = setTimeout(() => {
        // Trigger merge success visuals (burst → success icon + green beam)
        triggerMergeSuccess(job.struct, job.dev);

        // After the success visuals (≈4 s), resume developer walking and clear job
        setTimeout(() => {
          job.dev.isWorking = false;
          job.dev.mrJob = null;
          const neighbours = ROAD_GRAPH[job.dev.targetIdx];
          job.dev.targetIdx = neighbours[Math.floor(Math.random() * neighbours.length)];
        }, 4000);
      }, 8500);
    }
    return !job.arrived;
  });

  // Move each developer toward its current waypoint
  devs.forEach((dev) => {
    if (dev.isStationary) {
      // Wira: seated idle — gentle arm sway only, body stays on bench
      const sway = Math.sin(t * 1.5 + dev.phase) * 0.08;
      dev.aL.rotation.x = 0.5 + sway;
      dev.aR.rotation.x = 0.5 - sway;
      return;
    }
    // Developer is at their desk working — only subtle hand-typing sway
    if (dev.isWorking) {
      const tap = Math.sin(t * 8 + dev.phase) * 0.12;
      dev.aL.rotation.x = -0.6 + tap;
      dev.aR.rotation.x = -0.6 - tap;
      return;
    }
    const target = WAYPOINTS[dev.targetIdx];
    const dir = target.clone().sub(dev.group.position);
    if (dir.length() < 0.25) {
      // pick next waypoint based on role
      if (dev.role === 'caretaker') {
        // caretakers alternate between plaza and EOC along the road
        dev.targetIdx = CARETAKER_WPS[Math.floor(Math.random() * CARETAKER_WPS.length)];
      } else {
        // engineers follow road adjacency — only step to connected neighbours
        const neighbours = ROAD_GRAPH[dev.targetIdx];
        dev.targetIdx = neighbours[Math.floor(Math.random() * neighbours.length)];
      }
    } else {
      dev.group.position.addScaledVector(dir.normalize(), dev.speed);
      dev.group.rotation.y = Math.atan2(dir.x, dir.z);
      // limb swing
      const swing = Math.sin(t * 6 + dev.phase) * 0.4;
      dev.lL.rotation.x =  swing;
      dev.lR.rotation.x = -swing;
      dev.aL.rotation.x = -swing * 0.75;
      dev.aR.rotation.x =  swing * 0.75;
    }
  });

  updateCamera();
  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Open MR Panel ─────────────────────────────────────────────
(function buildMRPanel() {
  const list      = document.getElementById('mr-panel-list');
  const totalEl   = document.getElementById('mr-panel-total-value');

  // Sort: highest MR count first, then alphabetically
  const sorted = [...STRUCTURES].sort((a, b) => b.openMRs - a.openMRs || a.repo.localeCompare(b.repo));

  const total = sorted.reduce((s, r) => s + r.openMRs, 0);
  totalEl.textContent = total;

  sorted.forEach(s => {
    const countLevel = s.openMRs >= 6 ? 'high' : s.openMRs >= 3 ? 'medium' : s.openMRs >= 1 ? 'low' : 'zero';

    const a = document.createElement('a');
    a.className  = 'mr-repo-row' + (s.openMRs === 0 ? ' zero' : '');
    a.href       = s.gitlabUrl;
    a.target     = '_blank';
    a.rel        = 'noopener noreferrer';
    a.innerHTML  = `
      <span class="mr-repo-icon">${s.icon}</span>
      <span class="mr-repo-name">${s.repo}</span>
      <span class="mr-count-badge ${countLevel}">${s.openMRs}</span>
      <span class="mr-gitlab-arrow">↗</span>
    `;
    list.appendChild(a);
  });
})();

function toggleMRPanel() {
  const overlay = document.getElementById('mr-panel-overlay');
  overlay.classList.toggle('open');
}
function closeMRPanel(e) {
  if (e.target === document.getElementById('mr-panel-overlay')) {
    document.getElementById('mr-panel-overlay').classList.remove('open');
  }
}
function closeMRPanelDirect() {
  document.getElementById('mr-panel-overlay').classList.remove('open');
}
// Expose to global scope so onclick="" attributes work from module context
window.toggleMRPanel      = toggleMRPanel;
window.closeMRPanel       = closeMRPanel;
window.closeMRPanelDirect = closeMRPanelDirect;

// ═══════════════════════════════════════════════════════════════
// ── Dev Profile Panel ──────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════

// Activity log: accumulated as simulated events fire during the session.
// Each entry: { type: 'commit'|'mr-open'|'mr-merge', repo, time }
const devActivityLog = {};   // keyed by dev name (matches PEOPLE[].name)
PEOPLE.forEach(p => { devActivityLog[p.name] = []; });

// Hook into the existing job machinery to record activities as they happen.
// We patch the job-creation points by wrapping the existing fire* functions.
const _origFireCommit = fireCommitEvent;
// (We can't easily wrap the closures, so instead we record inside animate()
//  by watching job arrival — see recordJobActivity() calls added below.)

function recordActivity(devName, type, repo) {
  const log = devActivityLog[devName];
  if (!log) return;
  log.unshift({ type, repo, time: new Date() });
  if (log.length > 40) log.length = 40;   // keep last 40 per dev

  // If the dev panel is open and showing this dev, refresh live
  const activeCard = document.querySelector('.dev-profile-card[data-dev]');
  if (activeCard && activeCard.dataset.dev === devName) {
    renderDevActivity(devName);
  }
}

// Called from animate() when a job arrives — we patch job objects to set
// a `recorded` flag so we only record once per job.
function maybeRecordJobArrival(job, type) {
  if (job._recorded) return;
  job._recorded = true;
  recordActivity(job.dev.name, type, job.struct.repo);
}

// ── Fuzzy search ──────────────────────────────────────────────
function searchPeople(query) {
  if (!query.trim()) return [];
  const q = query.toLowerCase();
  return PEOPLE.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.gitlab.toLowerCase().includes(q)
  ).slice(0, 6);
}

// ── Avatar emoji based on gender/role ─────────────────────────
function avatarFor(p) {
  if (p.role === 'leader')    return '👑';
  if (p.role === 'caretaker') return p.gender === 'female' ? '🌿' : '🌳';
  return p.gender === 'female' ? '👩‍💻' : '👨‍💻';
}

// ── Render profile card ───────────────────────────────────────
function renderDevProfile(person) {
  const profileEl = document.getElementById('dev-profile');
  const avatarCls = person.role === 'leader' ? 'leader' : person.gender === 'female' ? 'female' : '';
  const nameCls   = person.role === 'leader' ? 'leader' : '';
  profileEl.innerHTML = `
    <div class="dev-profile-card" data-dev="${person.name}">
      <div class="dev-avatar ${avatarCls}">${avatarFor(person)}</div>
      <div class="dev-info">
        <div class="dev-info-name ${nameCls}">${person.name}</div>
        <div class="dev-info-gitlab">@${person.gitlab}</div>
        <span class="dev-role-badge ${person.role}">${person.role}</span>
      </div>
    </div>`;
}

// ── Render stats + per-repo breakdown table ───────────────────
function renderDevActivity(devName) {
  const log = devActivityLog[devName] || [];

  // ── 1. Aggregate totals (for the 4 summary boxes) ────────────
  const totals = { commit: 0, 'mr-open': 0, 'mr-merge': 0, pipeline: 0 };
  log.forEach(e => { if (totals[e.type] !== undefined) totals[e.type]++; });

  const statsEl = document.getElementById('dev-stats-row');
  statsEl.innerHTML = `
    <div class="dev-stat-box commits">
      <div class="stat-num">${totals.commit}</div>
      <div class="stat-lbl">Commits</div>
    </div>
    <div class="dev-stat-box mr-open">
      <div class="stat-num">${totals['mr-open']}</div>
      <div class="stat-lbl">MRs Opened</div>
    </div>
    <div class="dev-stat-box mr-merge">
      <div class="stat-num">${totals['mr-merge']}</div>
      <div class="stat-lbl">MRs Merged</div>
    </div>
    <div class="dev-stat-box pipeline">
      <div class="stat-num">${totals.pipeline}</div>
      <div class="stat-lbl">Pipelines</div>
    </div>`;

  document.getElementById('dev-activity-title').style.display = '';

  // ── 2. Build per-repo counts ──────────────────────────────────
  // repoStats: { [repoName]: { commit, mr-open, mr-merge, pipeline } }
  const repoStats = {};
  STRUCTURES.forEach(s => {
    repoStats[s.repo] = { commit: 0, 'mr-open': 0, 'mr-merge': 0, pipeline: 0, icon: s.icon };
  });
  log.forEach(e => {
    if (repoStats[e.repo]) repoStats[e.repo][e.type]++;
  });

  const listEl = document.getElementById('dev-activity-list');

  if (log.length === 0) {
    listEl.innerHTML = '<div id="dev-empty-state">No activity recorded yet this session.<br>Activity accumulates as the simulation runs.</div>';
    return;
  }

  // Sort repos: repos with any activity first (by total desc), then the rest
  const sorted = STRUCTURES.slice().sort((a, b) => {
    const ta = Object.values(repoStats[a.repo]).filter(v => typeof v === 'number').reduce((s,v)=>s+v,0);
    const tb = Object.values(repoStats[b.repo]).filter(v => typeof v === 'number').reduce((s,v)=>s+v,0);
    return tb - ta;
  });

  const n = v => `<span class="msn${v === 0 ? ' zero' : ''}">${v}</span>`;

  listEl.innerHTML = `
    <div class="dev-repo-header">
      <div></div>
      <div class="dev-repo-header-lbl left">Repository</div>
      <div class="dev-repo-header-lbl" title="Commits">🔨<br>Commits</div>
      <div class="dev-repo-header-lbl" title="MRs Opened">🔀<br>Open</div>
      <div class="dev-repo-header-lbl" title="MRs Merged">✅<br>Merged</div>
      <div class="dev-repo-header-lbl" title="Pipelines">⚙️<br>Pipelines</div>
    </div>
    ${sorted.map(s => {
      const r   = repoStats[s.repo];
      const tot = r.commit + r['mr-open'] + r['mr-merge'] + r.pipeline;
      return `
        <div class="dev-repo-row${tot > 0 ? ' active' : ''}">
          <div class="dev-repo-icon">${s.icon}</div>
          <div class="dev-repo-name" title="${s.repo}">${s.repo}</div>
          <div class="dev-mini-stat c">${n(r.commit)}<span class="msi">commits</span></div>
          <div class="dev-mini-stat mo">${n(r['mr-open'])}<span class="msi">open</span></div>
          <div class="dev-mini-stat mm">${n(r['mr-merge'])}<span class="msi">merged</span></div>
          <div class="dev-mini-stat pi">${n(r.pipeline)}<span class="msi">pipelines</span></div>
        </div>`;
    }).join('')}`;
}

// ── Select a developer ────────────────────────────────────────
function selectDev(person) {
  // Clear search
  document.getElementById('dev-search-input').value  = person.name;
  document.getElementById('dev-suggestions').innerHTML = '';

  renderDevProfile(person);
  renderDevActivity(person.name);
}

// ── Search input handler ──────────────────────────────────────
function onDevSearch(value) {
  const sugEl = document.getElementById('dev-suggestions');
  const results = searchPeople(value);
  if (results.length === 0) { sugEl.innerHTML = ''; return; }

  sugEl.innerHTML = results.map(p => `
    <li onclick="window._selectDevByName('${p.name.replace(/'/g, "\\'")}')">
      <span>${avatarFor(p)}</span>
      <span>${p.name}</span>
      <span style="font-size:11px;color:rgba(100,190,220,0.6)">@${p.gitlab}</span>
      <span class="sug-role">${p.role}</span>
    </li>`).join('');
}

window._selectDevByName = function(name) {
  const person = PEOPLE.find(p => p.name === name);
  if (person) selectDev(person);
};

// ── Panel open/close ──────────────────────────────────────────
function openDevPanel() {
  document.getElementById('dev-panel-overlay').classList.add('open');
  setTimeout(() => document.getElementById('dev-search-input').focus(), 80);
}
function closeDevPanel(e) {
  if (e.target === document.getElementById('dev-panel-overlay'))
    document.getElementById('dev-panel-overlay').classList.remove('open');
}
function closeDevPanelDirect() {
  document.getElementById('dev-panel-overlay').classList.remove('open');
}

window.openDevPanel       = openDevPanel;
window.closeDevPanel      = closeDevPanel;
window.closeDevPanelDirect= closeDevPanelDirect;
window.onDevSearch        = onDevSearch;

// ── Tap into job arrival in the animate loop ──────────────────
// We monkey-patch the arrays so we can observe new arrivals without
// touching the existing animation logic.
const _origActiveJobsPush   = activeJobs.push.bind(activeJobs);
const _origActiveMRJobsPush = activeMRJobs.push.bind(activeMRJobs);

// Instead of monkey-patching (fragile), we record in a rAF post-pass.
// Each frame, scan jobs that just arrived (arrived===true, !_recorded).
const _rafRecorder = () => {
  activeJobs.forEach(job => {
    if (job.arrived && !job._recorded) {
      maybeRecordJobArrival(job, 'commit');
      // Every commit triggers a CI pipeline
      recordActivity(job.dev.name, 'pipeline', job.struct.repo);
    }
  });
  activeMRJobs.forEach(job => {
    if (job.arrived && !job._recorded) maybeRecordJobArrival(job, 'mr-open');
  });
  requestAnimationFrame(_rafRecorder);
};
requestAnimationFrame(_rafRecorder);
</script>
